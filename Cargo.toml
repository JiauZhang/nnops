[package]
name = "nnops"
version = "0.1.0"
edition = "2021"
description = "A lightweight neural network operator library (Rust port)"

[features]
default = ["cpu"]
cpu = []
cuda = []
mps = ["dep:metal"]

[dependencies]
rand = "0.8"
rand_distr = "0.4"
lazy_static = "1.4"

[target.'cfg(target_os = "macos")'.dependencies]
metal = { version = "0.28", optional = true }