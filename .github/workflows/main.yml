name: Build and publish to PyPI

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '**/.gitignore'

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            maturin-args: --release --out dist --features cpu
          - os: windows-latest
            maturin-args: --release --out dist --features cpu
          - os: macos-latest
            maturin-args: --release --out dist --features "cpu,mps"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Build wheel
      uses: PyO3/maturin-action@v1
      with:
        command: build
        args: ${{ matrix.maturin-args }}

    - name: Install wheel
      run: pip install pytest nnops --find-links dist/

    - name: Run tests
      run: python -m pytest tests/ -v -W error::RuntimeWarning

    - name: Publish to PyPI
      if: startsWith(github.ref, 'refs/tags')
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}